services:
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_MODE: 'true'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  kibana:
    image: kibana:8.12.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - 5601:5601
    depends_on:
      - elasticsearch

  mongo:
    image: mongo
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestionservice:
    build: ./ingestionservice
    image: ingestionservice
    container_name: ingestionservice
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - PUBLISHER_TOPIC=wav-metadata
      - FOLDER_PATH=/app/podcasts
    volumes:
      - ./podcasts:/app/podcasts
    depends_on:
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kibana:
        condition: service_started

  text_analyzer:
    build: ./text_analyzer
    image: text_analyzer
    container_name: text_analyzer
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - CONSUMER_TOPIC=wav-metadata
      - CONSUMER_GROUP_ID=podcasts_anlays
      - PUBLISHER_TOPIC=analys_text
    depends_on:
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kibana:
        condition: service_started

  dataconsumption:
    build: ./dataconsumption
    image: dataconsumption
    container_name: dataconsumption
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - CONSUMER_TOPIC=analys_text
      - CONSUMER_GROUP_ID=podcasts_save
      - ES_URI=http://elasticsearch:9200
      - ES_INDEX=podcasts
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=podcasts
      - MONGO_DB_COLLACTION=podcasts
    depends_on:
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kibana:
        condition: service_started
      text_analyzer:
        condition: service_started

volumes:
  kafka_data:
  esdata:
  mongo-data:
  podcasts:
